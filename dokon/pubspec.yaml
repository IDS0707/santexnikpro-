name: santexnik_pro
description: Santexnik PRO — ustalar uchun mobil ilova
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.4
  geolocator: ^13.0.1
  geocoding: ^3.0.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B1120"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/calc/
